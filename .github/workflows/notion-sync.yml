name: Sync Notion Coffee Data
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: Fetch and inspect Notion data
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
          -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -d '{
            "page_size": 100,
            "filter": {
              "property": "Publish",
              "checkbox": {
                "equals": true
              }
            }
          }' \
          -o notion.json
          
          echo "========== FILE SIZE =========="
          ls -lh notion.json
          
          echo "========== FIRST 2000 CHARS =========="
          head -c 2000 notion.json
          
          echo ""
          echo "========== CHECKING STRUCTURE =========="
          node -e "const d=require('./notion.json'); console.log('Has results:', !!d.results); console.log('Result count:', d.results?.length || 0); if(d.results?.[0]) { console.log('First page ID:', d.results[0].id); console.log('Property names:', Object.keys(d.results[0].properties || {})); }"
      
      - name: Inspect first property in detail
        run: |
          node <<'EOF'
          const raw = require('./notion.json');
          if (!raw.results || raw.results.length === 0) {
            console.log("NO RESULTS FOUND");
            process.exit(0);
          }
          
          const firstPage = raw.results[0];
          const props = firstPage.properties;
          
          console.log("\n========== FIRST PAGE FULL PROPERTIES ==========");
          console.log(JSON.stringify(props, null, 2));
          EOF
