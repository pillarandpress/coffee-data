name: Sync Notion Coffee Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Notion data
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
          -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -o notion.json

      - name: Debug Notion properties
        run: |
          node <<'EOF'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('notion.json'));

          const first = raw.results?.[0]?.properties || {};

          fs.writeFileSync(
            "debug-properties.json",
            JSON.stringify(first, null, 2)
          );

          // also create placeholder so workflow continues
          fs.writeFileSync("coffee-homepage.json", "[]");
          EOF

      - name: Commit debug output
        run: |
          git config user.name "Notion Sync"
          git config user.email "sync@github.com"
          git add debug-properties.json coffee-homepage.json
          git commit -m "Debug Notion properties" || echo "No changes"
          git push
