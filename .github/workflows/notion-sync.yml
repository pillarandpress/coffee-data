name: Sync Notion Coffee Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Notion data
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
          -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -o notion.json

      - name: Convert Notion to coffee JSON
        run: |
          node <<'EOF'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('notion.json'));

          function plainText(arr = []) {
            return (arr || []).map(t => t?.plain_text ?? "").join("");
          }

          function getTitle(p, n) {
            return plainText(p?.[n]?.title || []);
          }

          function getRollup(p, n) {
            const r = p?.[n]?.rollup;
            if (!r || r.type !== "array") return "";

            return r.array
              .map(item => {
                if (item?.rich_text) return plainText(item.rich_text);
                if (item?.title) return plainText(item.title);
                if (item?.plain_text) return item.plain_text;
                if (item?.name) return item.name;
                return "";
              })
              .filter(Boolean)
              .join(", ");
          }

          function getFormula(p, n) {
            const f = p?.[n]?.formula;
            if (!f || !f.type) return "";
            const v = f[f.type];
            if (v == null) return "";
            return typeof v === "object" ? JSON.stringify(v) : String(v);
          }

          function getFile(p, n) {
            const f = p?.[n]?.files?.[0];
            if (!f) return "";
            if (f.type === "file") return f.file?.url || "";
            if (f.type === "external") return f.external?.url || "";
            return "";
          }

          function getUrl(p, n) {
            return p?.[n]?.url || "";
          }

          const coffees = raw.results
            .map(page => {
              const p = page.properties || {};

              const origin = getRollup(p,"Origin");
              const region = getRollup(p,"Region");
              const varieties = getRollup(p,"Varieties");
              const processing = getRollup(p,"Processing");

              return {
                "Coffee Name": getTitle(p,"Coffee Name"),
                "Roaster Name & Location": getFormula(p,"Roaster Name & Location"),

                "Origin & Region":
                  origin && region ? `${origin} — ${region}` :
                  origin || region || "",

                "More on Origin": getFormula(p,"More on Origin"),

                "Altitude Range": getFormula(p,"Altitude Range"),

                "Variety & Process":
                  varieties && processing ? `${varieties} • ${processing}` :
                  varieties || processing || "",

                "Cover":
                  getUrl(p,"Cover (Public URL)") ||
                  getFile(p,"Cover"),

                "About the Coffee":
                  getRollup(p,"About the Coffee"),

                "Roaster Recognition & Awards":
                  getRollup(p,"Roaster Recognition & Awards"),

                "More from the Drawdown":
                  getUrl(p,"More from the Drawdown"),

                "Publish": p?.["Publish"]?.checkbox || false,
                "Featured": p?.["Featured"]?.checkbox || false,
                "Created": page.created_time
              };
            })
            .filter(c => c["Publish"]);

          fs.writeFileSync(
            "coffee-homepage.json",
            JSON.stringify(coffees, null, 2)
          );
          EOF

      - name: - name: Commit updated JSON
  run: |
    git config user.name "Notion Sync"
    git config user.email "sync@github.com"

    git add coffee-homepage.json

    git diff --cached --quiet || git commit -m "Auto-sync coffee data"
    git push
