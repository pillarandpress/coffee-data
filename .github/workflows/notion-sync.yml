name: Sync Notion Coffee Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Fetch + Convert Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node <<'EOF'
          const fs = require("fs");

          const NOTION_TOKEN = process.env.NOTION_TOKEN;
          const DATABASE_ID = process.env.NOTION_DATABASE_ID;

          async function fetchAll() {
            let results = [];
            let cursor;

            do {
              const res = await fetch(
                `https://api.notion.com/v1/databases/${DATABASE_ID}/query`,
                {
                  method: "POST",
                  headers: {
                    Authorization: `Bearer ${NOTION_TOKEN}`,
                    "Notion-Version": "2022-06-28",
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                    start_cursor: cursor,
                    page_size: 100
                  })
                }
              );

              const data = await res.json();
              results.push(...data.results);
              cursor = data.has_more ? data.next_cursor : undefined;

            } while (cursor);

            return results;
          }

          function plain(arr){
            return (arr || []).map(t => t.plain_text).join("");
          }

          function getTitle(p,n){
            return plain(p?.[n]?.title);
          }

          function getFormula(p,n){
            const f = p?.[n]?.formula;
            if(!f) return "";
            return (
              f.string ??
              f.number ??
              (f.boolean ? "Yes" : "") ??
              ""
            );
          }

          function getCheckbox(p,n){
            return p?.[n]?.checkbox || false;
          }

          function getUrl(p,n){
            return p?.[n]?.url || "";
          }

          function getFile(p,n){
            const f = p?.[n]?.files?.[0];
            if(!f) return "";
            if(f.type === "external") return f.external.url;
            if(f.type === "file") return f.file.url;
            return "";
          }

          (async () => {

            const pages = await fetchAll();

            const data = pages
              .map(page => {

                const p = page.properties;

                return {
                  "Coffee Name": getTitle(p,"Coffee Name"),
                  "Roaster Name & Location": getFormula(p,"Roaster Name & Location"),
                  "Origin & Region": getFormula(p,"Origin & Region"),
                  "More on Origin": getFormula(p,"More on Origin"),
                  "Altitude Range": getFormula(p,"Altitude Range"),
                  "Variety & Process": getFormula(p,"Variety & Process"),
                  "Cover": getFile(p,"Cover") || getUrl(p,"Cover (Public URL)"),
                  "About the Coffee": getFormula(p,"About the Coffee"),
                  "Roaster Recognition & Awards": getFormula(p,"Roaster Recognition & Awards"),
                  "More from the Drawdown": getUrl(p,"More from the Drawdown"),
                  "Publish": getCheckbox(p,"Publish"),
                  "Featured": getCheckbox(p,"Featured"),
                  "Created": page.created_time,
                  "Last Updated": page.last_edited_time
                };

              })
              .filter(item => item.Publish);

            fs.writeFileSync(
              "coffee-homepage.json",
              JSON.stringify(data, null, 2)
            );

          })();
          EOF

      - name: Commit updated JSON
        run: |
          git config user.name "Notion Sync"
          git config user.email "actions@github.com"

          git pull --rebase origin main || true

          git add coffee-homepage.json
          git commit -m "Auto-sync coffee data" || echo "No changes"

          git push
