name: Sync Notion Coffee Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Notion data
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
          -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -o notion.json

      - name: Convert Notion to coffee JSON
        run: |
          node <<'EOF'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('notion.json'));

          function plainText(arr = []) {
            return (arr || []).map(t => t?.plain_text ?? "").join("");
          }

          function getTitle(props, name) {
            return plainText(props?.[name]?.title || []);
          }

          function getFormula(props, name) {
            const f = props?.[name]?.formula;
            if (!f || !f.type) return "";

            const v = f[f.type];

            if (v === null || v === undefined) return "";

            if (typeof v === "string") return v;
            if (typeof v === "number") return String(v);
            if (typeof v === "boolean") return v ? "Yes" : "";

            if (Array.isArray(v)) {
              return v.map(x => x?.plain_text || "").join("");
            }

            if (typeof v === "object") {
              if (v.rich_text) return plainText(v.rich_text);
              if (v.title) return plainText(v.title);
              if (v.plain_text) return v.plain_text;
            }

            return "";
          }

          function getFile(props, name) {
            const f = props?.[name]?.files?.[0];
            if (!f) return "";
            if (f.type === "file") return f.file?.url || "";
            if (f.type === "external") return f.external?.url || "";
            return "";
          }

          function getUrl(props, name) {
            return props?.[name]?.url || "";
          }

          const coffees = raw.results
            .map(page => {
              const props = page.properties || {};

              return {
                "Coffee Name": getTitle(props, "Coffee Name"),
                "Roaster Name & Location": getFormula(props, "Roaster Name & Location"),
                "Origin & Region": getFormula(props, "Origin & Region"),
                "More on Origin": getFormula(props, "More on Origin"),
                "Altitude Range": getFormula(props, "Altitude Range"),
                "Variety & Process": getFormula(props, "Variety & Process"),
                "Cover": getUrl(props, "Cover (Public URL)") || getFile(props, "Cover"),
                "About the Coffee": getFormula(props, "About the Coffee"),
                "Roaster Recognition & Awards": getFormula(props, "Roaster Recognition & Awards"),
                "More from the Drawdown": getUrl(props, "More from the Drawdown"),
                "Publish": props?.["Publish"]?.checkbox || false,
                "Featured": props?.["Featured"]?.checkbox || false,
                "Created": page.created_time,
                "Last Updated": new Date().toISOString()
              };
            })
            .filter(c => c["Publish"]);

          fs.writeFileSync(
            "coffee-homepage.json",
            JSON.stringify(coffees, null, 2)
          );
          EOF

      - name: Commit updated JSON
        run: |
          git config user.name "Notion Sync"
          git config user.email "sync@github.com"

          git add coffee-homepage.json
          git diff --cached --quiet || git commit -m "Auto-sync coffee data"

          git pull --rebase origin main || true
          git push origin main
