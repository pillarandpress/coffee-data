name: Sync Coffee Database

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Fetch from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node <<'EOF'
          const fs = require("fs");

          async function fetchAll() {
            let results = [];
            let cursor;

            do {
              const res = await fetch(
                `https://api.notion.com/v1/databases/${process.env.DATABASE_ID}/query`,
                {
                  method: "POST",
                  headers: {
                    Authorization: `Bearer ${process.env.NOTION_TOKEN}`,
                    "Notion-Version": "2022-06-28",
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                    start_cursor: cursor,
                    page_size: 100
                  })
                }
              );

              const data = await res.json();
              results.push(...data.results);
              cursor = data.has_more ? data.next_cursor : undefined;

            } while (cursor);

            return results;
          }

          function text(arr){
            return (arr || []).map(t => t.plain_text).join("");
          }

          function title(p,n){ return text(p?.[n]?.title); }
          function rich(p,n){ return text(p?.[n]?.rich_text); }
          function checkbox(p,n){ return p?.[n]?.checkbox || false; }
          function url(p,n){ return p?.[n]?.url || ""; }

          function file(p,n){
            const f = p?.[n]?.files?.[0];
            if(!f) return "";
            if(f.type === "external") return f.external.url;
            if(f.type === "file") return f.file.url;
            return "";
          }

          (async () => {

            const pages = await fetchAll();

            const data = pages
              .map(page => {

                const p = page.properties;

                return {
                  "Coffee Name": title(p,"Coffee Name"),
                  "Roaster Name & Location": rich(p,"Roaster Name & Location"),
                  "Origin & Region": rich(p,"Origin & Region"),
                  "More on Origin": rich(p,"More on Origin"),
                  "Altitude Range": rich(p,"Altitude Range"),
                  "Variety & Process": rich(p,"Variety & Process"),
                  "About the Coffee": rich(p,"About the Coffee"),
                  "Roaster Recognition & Awards": rich(p,"Roaster Recognition & Awards"),
                  "More from the Drawdown": url(p,"More from the Drawdown"),
                  "Cover": file(p,"Cover"),
                  "Featured": checkbox(p,"Featured"),
                  "Publish": checkbox(p,"Publish"),
                  "Created": page.created_time
                };

              })
              .filter(item => item.Publish);

            fs.writeFileSync(
              "coffee-homepage.json",
              JSON.stringify(data, null, 2)
            );

          })();
          EOF

      - name: Commit JSON
        run: |
          git config user.name "Notion Sync"
          git config user.email "actions@github.com"

          git pull --rebase origin main || true

          git add coffee-homepage.json
          git commit -m "Sync coffee database" || echo "No changes"

          git push
