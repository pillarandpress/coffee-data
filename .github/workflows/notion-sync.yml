name: Debug Notion Coffee Data

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Notion data
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
          -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -o notion.json

      - name: Convert Notion to DEBUG JSON
        run: |
          node <<'EOF'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('notion.json'));

          function plainText(arr = []) {
            return (arr || []).map(t => t?.plain_text ?? "").join("");
          }

          function extractValue(prop) {
            if (!prop) return null;

            switch (prop.type) {
              case "title":
                return plainText(prop.title);

              case "rich_text":
                return plainText(prop.rich_text);

              case "url":
                return prop.url;

              case "checkbox":
                return prop.checkbox;

              case "number":
                return prop.number;

              case "select":
                return prop.select?.name || null;

              case "multi_select":
                return prop.multi_select?.map(x => x.name).join(", ");

              case "date":
                return prop.date?.start || null;

              case "formula":
                return prop.formula?.string ??
                       prop.formula?.number ??
                       prop.formula?.boolean ??
                       null;

              case "rollup":
                if (prop.rollup?.array) {
                  return prop.rollup.array.map(item => {
                    if (item.rich_text) return plainText(item.rich_text);
                    if (item.title) return plainText(item.title);
                    if (item.name) return item.name;
                    return "";
                  }).join(", ");
                }
                return null;

              case "files":
                return prop.files?.[0]?.file?.url ||
                       prop.files?.[0]?.external?.url ||
                       null;

              case "relation":
                return prop.relation?.map(r => r.id);

              default:
                return null;
            }
          }

          const debug = raw.results.map(page => {
            const props = page.properties || {};
            const out = {};

            Object.keys(props).forEach(key => {
              out[key] = extractValue(props[key]);
            });

            out["_created"] = page.created_time;
            out["_lastEdited"] = page.last_edited_time;

            return out;
          });

          fs.writeFileSync(
            "coffee-debug.json",
            JSON.stringify(debug, null, 2)
          );
          EOF

      - name: Commit debug JSON
        run: |
          git config user.name "Notion Debug"
          git config user.email "debug@github.com"

          git add coffee-debug.json
          git diff --cached --quiet || git commit -m "Debug Notion fields"

          git pull --rebase origin main || true
          git push origin main
